<!DOCTYPE html>
<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Mis Proyectos",
  "schemaVersion": 1,
  "description": "Rastreador de proyectos personales de desarrollo. Guarda proyectos con estado, prioridad, próximos pasos y tags. Los datos persisten localmente entre sesiones."
}
</script>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Proyectos</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }

  .header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 700; color: #111; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn { padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-ghost { background: transparent; color: #6b7280; border: 1px solid #d1d5db; }
  .btn-ghost:hover { background: #f9fafb; }
  .btn-danger { background: #fee2e2; color: #dc2626; border: none; }
  .btn-danger:hover { background: #fecaca; }

  .filters { padding: 12px 20px; background: #fff; border-bottom: 1px solid #e5e7eb; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; transition: all .15s; background: #f3f4f6; color: #6b7280; }
  .filter-btn.active { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
  .search-input { margin-left: auto; padding: 6px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; width: 200px; outline: none; }
  .search-input:focus { border-color: #2563eb; }

  .stats { padding: 12px 20px; display: flex; gap: 12px; flex-wrap: wrap; }
  .stat { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px 16px; min-width: 100px; }
  .stat-value { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 11px; color: #6b7280; margin-top: 2px; text-transform: uppercase; letter-spacing: .04em; }

  .projects { padding: 16px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px; transition: box-shadow .15s; }
  .card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-title { font-size: 15px; font-weight: 600; color: #111; line-height: 1.3; flex: 1; }
  .card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
  .card:hover .card-actions { opacity: 1; }
  .icon-btn { background: none; border: none; cursor: pointer; padding: 4px; border-radius: 6px; font-size: 14px; color: #6b7280; }
  .icon-btn:hover { background: #f3f4f6; }

  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .badge-activo    { background: #dcfce7; color: #16a34a; }
  .badge-pausado   { background: #fef9c3; color: #ca8a04; }
  .badge-completado{ background: #eff6ff; color: #2563eb; }
  .badge-idea      { background: #f3f4f6; color: #6b7280; }

  .priority { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #6b7280; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-alta   { background: #ef4444; }
  .dot-media  { background: #f59e0b; }
  .dot-baja   { background: #22c55e; }

  .card-desc { font-size: 13px; color: #4b5563; line-height: 1.5; }
  .card-next { font-size: 12px; color: #2563eb; background: #eff6ff; padding: 6px 10px; border-radius: 7px; }
  .card-next::before { content: '→ '; font-weight: 600; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { background: #f3f4f6; color: #374151; font-size: 11px; padding: 2px 7px; border-radius: 5px; }
  .card-link { font-size: 12px; color: #2563eb; text-decoration: none; }
  .card-link:hover { text-decoration: underline; }
  .card-date { font-size: 11px; color: #9ca3af; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 24px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
  .modal h2 { font-size: 16px; font-weight: 700; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 13px; font-weight: 500; color: #374151; }
  input, textarea, select { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; }
  input:focus, textarea:focus, select:focus { border-color: #2563eb; }
  textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }

  .empty { text-align: center; padding: 60px 20px; color: #6b7280; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <h1>🚀 Mis Proyectos</h1>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openModal()">+ Nuevo proyecto</button>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>
  <button class="filter-btn" onclick="setFilter('activo', this)">Activo</button>
  <button class="filter-btn" onclick="setFilter('pausado', this)">Pausado</button>
  <button class="filter-btn" onclick="setFilter('completado', this)">Completado</button>
  <button class="filter-btn" onclick="setFilter('idea', this)">Idea</button>
  <input class="search-input" type="text" placeholder="🔍 Buscar proyecto..." oninput="setSearch(this.value)">
</div>

<div class="stats" id="stats"></div>
<div class="projects" id="projects"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modalTitle">Nuevo proyecto</h2>
    <div class="form-group">
      <label>Nombre del proyecto *</label>
      <input id="f-name" type="text" placeholder="Mi proyecto increíble">
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea id="f-desc" placeholder="¿De qué trata este proyecto?"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Estado</label>
        <select id="f-status">
          <option value="activo">Activo</option>
          <option value="pausado">Pausado</option>
          <option value="idea">Idea</option>
          <option value="completado">Completado</option>
        </select>
      </div>
      <div class="form-group">
        <label>Prioridad</label>
        <select id="f-priority">
          <option value="alta">Alta</option>
          <option value="media">Media</option>
          <option value="baja">Baja</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Próximo paso</label>
      <input id="f-next" type="text" placeholder="Lo que necesitas hacer ahora">
    </div>
    <div class="form-group">
      <label>Tags (separados por coma)</label>
      <input id="f-tags" type="text" placeholder="React, API, mobile">
    </div>
    <div class="form-group">
      <label>Enlace (repo, docs, etc.)</label>
      <input id="f-link" type="url" placeholder="https://github.com/...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveProject()">Guardar</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'dev_projects_v1';

const SAMPLE_PROJECTS = [
  {
    id: 1, name: 'API REST con Node.js', status: 'activo', priority: 'alta',
    desc: 'Backend para la app móvil. Endpoints de autenticación y manejo de usuarios.',
    next: 'Implementar JWT refresh tokens', tags: ['Node.js', 'Express', 'MongoDB'],
    link: '', created: '2026-05-10'
  },
  {
    id: 2, name: 'Portfolio personal', status: 'pausado', priority: 'media',
    desc: 'Sitio web con mis proyectos y experiencia. Diseño minimalista.',
    next: 'Terminar sección de proyectos', tags: ['React', 'Tailwind'],
    link: '', created: '2026-04-20'
  },
  {
    id: 3, name: 'Bot de Telegram para alertas', status: 'idea', priority: 'baja',
    desc: 'Bot que notifique cuando hay cambios en mis repositorios de GitHub.',
    next: 'Investigar API de Telegram', tags: ['Python', 'Bot', 'GitHub'],
    link: '', created: '2026-05-15'
  },
  {
    id: 4, name: 'CLI para snippets', status: 'completado', priority: 'media',
    desc: 'Herramienta de línea de comandos para guardar y buscar fragmentos de código.',
    next: '', tags: ['Go', 'CLI'],
    link: '', created: '2026-03-01'
  }
];

let projects = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
if (!projects) { projects = SAMPLE_PROJECTS; save(); }

let editingId = null;
let currentFilter = 'todos';
let searchQuery = '';

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); }

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setSearch(q) { searchQuery = q.toLowerCase(); render(); }

function filtered() {
  return projects.filter(p => {
    const matchStatus = currentFilter === 'todos' || p.status === currentFilter;
    const matchSearch = !searchQuery ||
      p.name.toLowerCase().includes(searchQuery) ||
      (p.desc||'').toLowerCase().includes(searchQuery) ||
      (p.tags||[]).some(t => t.toLowerCase().includes(searchQuery));
    return matchStatus && matchSearch;
  });
}

function render() {
  const list = filtered();
  // Stats
  const counts = { activo: 0, pausado: 0, idea: 0, completado: 0 };
  projects.forEach(p => counts[p.status] = (counts[p.status]||0) + 1);
  document.getElementById('stats').innerHTML = [
    ['total', projects.length, '#111'],
    ['activos', counts.activo, '#16a34a'],
    ['pausados', counts.pausado, '#ca8a04'],
    ['ideas', counts.idea, '#6b7280'],
    ['completados', counts.completado, '#2563eb'],
  ].map(([label, val, color]) =>
    `<div class="stat"><div class="stat-value" style="color:${color}">${val}</div><div class="stat-label">${label}</div></div>`
  ).join('');

  // Cards
  const el = document.getElementById('projects');
  if (!list.length) {
    el.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><p>No hay proyectos que coincidan.</p></div>`;
    return;
  }
  el.innerHTML = list.map(p => {
    const tags = (p.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
    const link = p.link ? `<a class="card-link" href="${p.link}" target="_blank">🔗 Abrir</a>` : '';
    return `
    <div class="card">
      <div class="card-top">
        <div class="card-title">${p.name}</div>
        <div class="card-actions">
          <button class="icon-btn" title="Editar" onclick="editProject(${p.id})">✏️</button>
          <button class="icon-btn" title="Eliminar" onclick="deleteProject(${p.id})">🗑️</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span class="badge badge-${p.status}">${p.status}</span>
        <span class="priority"><span class="dot dot-${p.priority}"></span>${p.priority}</span>
      </div>
      ${p.desc ? `<div class="card-desc">${p.desc}</div>` : ''}
      ${p.next ? `<div class="card-next">${p.next}</div>` : ''}
      <div class="card-footer">
        <div class="card-tags">${tags}</div>
        ${link}
      </div>
      <div class="card-date">Creado: ${p.created || '—'}</div>
    </div>`;
  }).join('');
}

function openModal(id = null) {
  editingId = id;
  const p = id ? projects.find(x => x.id === id) : null;
  document.getElementById('modalTitle').textContent = id ? 'Editar proyecto' : 'Nuevo proyecto';
  document.getElementById('f-name').value = p?.name || '';
  document.getElementById('f-desc').value = p?.desc || '';
  document.getElementById('f-status').value = p?.status || 'activo';
  document.getElementById('f-priority').value = p?.priority || 'media';
  document.getElementById('f-next').value = p?.next || '';
  document.getElementById('f-tags').value = (p?.tags||[]).join(', ');
  document.getElementById('f-link').value = p?.link || '';
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('f-name').focus();
}

function editProject(id) { openModal(id); }

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function saveProject() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('El nombre es obligatorio.'); return; }
  const data = {
    name,
    desc: document.getElementById('f-desc').value.trim(),
    status: document.getElementById('f-status').value,
    priority: document.getElementById('f-priority').value,
    next: document.getElementById('f-next').value.trim(),
    tags: document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    link: document.getElementById('f-link').value.trim(),
  };
  if (editingId) {
    const idx = projects.findIndex(p => p.id === editingId);
    projects[idx] = { ...projects[idx], ...data };
  } else {
    projects.unshift({ id: Date.now(), created: new Date().toISOString().slice(0,10), ...data });
  }
  save(); closeModal(); render();
}

function deleteProject(id) {
  if (!confirm('¿Eliminar este proyecto?')) return;
  projects = projects.filter(p => p.id !== id);
  save(); render();
}

render();
</script>
</body>
</html>
